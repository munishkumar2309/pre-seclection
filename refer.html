<style>

  @media (max-width: 820px) {
  html {
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  input[type="text"],
  input[type="email"],
  input[type="tel"],
  select,
  textarea {
    font-size: 16px !important;
    line-height: 1.25 !important;
    min-height: 48px !important;
    padding: 12px 14px !important;
    max-width: 100% !important;
  }

  select {
    -webkit-appearance: menulist !important;
    appearance: auto !important;
    background-color: #fff !important;
    color: #111827 !important;
    text-overflow: ellipsis;
  }

  select:disabled {
    background-color: #f5f5f5 !important;
    color: #6b7280 !important;
    opacity: 1 !important;
  }

  .bc-language-switcher select {
    width: auto !important;
    min-width: 140px !important;
  }

  .actions {
    position: static !important;
    bottom: auto !important;
    margin-left: 0 !important;
    margin-right: 0 !important;
    padding-left: 0 !important;
    padding-right: 0 !important;
    background: transparent !important;
    backdrop-filter: none !important;
  }
}
:root{--blue:#003366;--light:#f7f9fc;--border:#d1d5db;--text:#111827;--muted:#6b7280;}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--light);color:var(--text)}
.wrap{max-width:900px;margin:28px auto;background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.08);overflow:hidden}
header{background:var(--blue);color:#fff;padding:28px 32px}
header h1{margin:0;font-size:26px}
header p{margin:10px 0 0;font-size:15px;opacity:.9;line-height:1.5}
main{padding:32px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.field{margin-bottom:16px}
label{display:block;font-weight:600;margin-bottom:7px}
input,select{width:100%;padding:11px;border:1px solid var(--border);border-radius:8px;font-size:15px;background:#fff}
button{border:0;border-radius:10px;padding:13px 20px;font-size:15px;cursor:pointer;font-weight:700;background:var(--blue);color:#fff}
button:disabled{opacity:.65;cursor:not-allowed}
.error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:12px;padding:12px;margin:14px 0;display:none}
.success{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;border-radius:12px;padding:14px;margin:14px 0;display:none}
.btn{display:inline-block;margin-top:14px;background:#003366;color:#fff;text-decoration:none;padding:12px 18px;border-radius:10px;font-weight:700}
.small{font-size:13px;color:var(--muted)}
.required{color:#b91c1c}
@media(max-width:760px){.grid{grid-template-columns:1fr}.wrap{margin:0;border-radius:0;min-height:100vh}main{padding:18px}}


/* Bajaj Capital brand UI patch */
:root {
  --brand-red:#df1f2d;
  --brand-red-dark:#b91521;
  --brand-yellow:#ffd400;
  --brand-black:#050505;
  --cream:#fff8ea;
  --light:#fff7ed;
  --surface:#ffffff;
  --border:#eadfd1;
  --text:#1f2937;
  --muted:#6b7280;
  --blue:var(--brand-red);
}
body {
  background:
    radial-gradient(circle at 0% 0%, rgba(255,212,0,.20), transparent 34%),
    radial-gradient(circle at 100% 0%, rgba(223,31,45,.10), transparent 32%),
    linear-gradient(135deg,#fff8ea 0%,#fff 48%,#fff1f2 100%) !important;
}
.wrap {
  border:1px solid rgba(223,31,45,.14) !important;
  box-shadow:0 20px 60px rgba(15,23,42,.12) !important;
}
header {
  background:#fff !important;
  color:var(--brand-black) !important;
  padding:22px 32px 20px !important;
  border-top:8px solid var(--brand-red) !important;
  border-bottom:1px solid rgba(223,31,45,.18) !important;
}
.brand {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
}
.brand-logo {
  width:min(420px, 70vw);
  height:auto;
  display:block;
}
.brand-copy {
  text-align:right;
  min-width:220px;
}
.brand-copy h1, header h1 {
  color:var(--brand-black) !important;
  margin:8px 0 4px !important;
  font-size:24px !important;
  letter-spacing:.01em !important;
}
.brand-copy p, header p {
  color:#4b5563 !important;
  opacity:1 !important;
  margin:4px 0 0 !important;
}
.header-chip {
  display:inline-flex;
  align-items:center;
  gap:8px;
  border:1px solid rgba(223,31,45,.22);
  color:var(--brand-red);
  background:#fff7f7;
  border-radius:999px;
  padding:7px 12px;
  font-size:12px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.header-chip:before {
  content:"";
  width:9px;
  height:9px;
  background:var(--brand-yellow);
  border-radius:50%;
  box-shadow:0 0 0 3px rgba(255,212,0,.25);
}
.section-title {
  color:var(--brand-red) !important;
  border-bottom:1px solid rgba(223,31,45,.18) !important;
}
button, .btn {
  background:linear-gradient(135deg,var(--brand-red),var(--brand-red-dark)) !important;
  color:#fff !important;
  box-shadow:0 10px 22px rgba(223,31,45,.18);
}
button.secondary {
  background:#fff !important;
  color:var(--brand-red) !important;
  border:1px solid rgba(223,31,45,.25) !important;
  box-shadow:none !important;
}
input:focus, select:focus, textarea:focus {
  outline:none;
  border-color:var(--brand-red) !important;
  box-shadow:0 0 0 4px rgba(223,31,45,.10);
}
.card {
  background:linear-gradient(180deg,#fff,#fff8ea) !important;
  border:1px solid rgba(223,31,45,.10);
}
.bar {
  background:linear-gradient(90deg,var(--brand-red),var(--brand-yellow)) !important;
}
.error {
  border-color:#fecaca !important;
}
.loadingOverlay {
  position:fixed;
  inset:0;
  background:rgba(255,248,234,.88);
  backdrop-filter:blur(6px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:20px;
}
.loadingOverlay.active {
  display:flex;
}
.loadingCard {
  width:min(460px, 92vw);
  background:#fff;
  border:1px solid rgba(223,31,45,.16);
  border-radius:20px;
  padding:28px;
  text-align:center;
  box-shadow:0 20px 50px rgba(15,23,42,.16);
}
.loadingCard img {
  width:min(280px, 70vw);
  height:auto;
  margin:0 auto 16px;
  display:block;
}
.spinner {
  width:36px;
  height:36px;
  border:4px solid #fde2e4;
  border-top-color:var(--brand-red);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin:16px auto 0;
}
@keyframes spin { to { transform:rotate(360deg); } }
@media(max-width:760px) {
  header { padding:18px !important; }
  .brand { flex-direction:column; align-items:flex-start; gap:14px; }
  .brand-copy { text-align:left; min-width:0; }
  .brand-copy h1, header h1 { font-size:22px !important; }
}

</style>

<style id="bc-i18n-style">
.bc-language-switcher {
  width:min(1040px, calc(100% - 48px));
  margin:18px auto -8px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:10px;
  font-family:Arial, Helvetica, sans-serif;
}
.bc-language-switcher label {
  margin:0;
  font-size:13px;
  font-weight:800;
  color:#a90f18;
}
.bc-language-switcher select {
  width:auto;
  min-height:36px;
  padding:7px 34px 7px 10px;
  border:1px solid rgba(223,31,45,.25);
  border-radius:999px;
  background:#fff;
  color:#111827;
  font-size:14px;
  font-weight:700;
}
@media(max-width:820px) {
  .bc-language-switcher {
    width:calc(100% - 24px);
    margin:12px auto 0;
    justify-content:flex-start;
  }
}
</style>
</head>

      <h1>DISC Assessment</h1>
      <p>Enter candidate details to generate a secure DISC assessment link.</p>

<main>
<div id="err" class="error"></div>
<div id="ok" class="success"></div>

<form id="f">
  <div class="grid">
    <div class="field">
      <label>Candidate Name <span class="required">*</span></label>
      <input id="candidate_name" autocomplete="name" minlength="2" maxlength="80" pattern="[A-Za-z\u0900-\u097F][A-Za-z\u0900-\u097F .'\-]{1,79}" title="Name should use letters only; spaces, dot, apostrophe and hyphen are allowed." required>
    </div>

    <div class="field">
      <label>Email ID <span class="required">*</span></label>
      <input id="candidate_email" type="email" autocomplete="email" maxlength="120" pattern="[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}" title="Enter a valid email address, for example name@example.com" required>
    </div>

    <div class="field">
      <label>Mobile No. <span class="required">*</span></label>
      <input id="candidate_mobile" type="tel" inputmode="numeric" minlength="10" maxlength="10" pattern="[6-9][0-9]{9}" autocomplete="tel" title="Enter a valid 10 digit Indian mobile number starting with 6, 7, 8 or 9." required>
    </div>

    <div class="field">
      <label>State <span class="required">*</span></label>
      <select id="candidate_state" required>
        <option value="">Select State</option><option value="Andhra Pradesh">Andhra Pradesh</option><option value="Assam">Assam</option><option value="Bihar">Bihar</option><option value="Chhattisgarh">Chhattisgarh</option><option value="Delhi">Delhi</option><option value="Gujarat">Gujarat</option><option value="Haryana">Haryana</option><option value="Himachal Pradesh">Himachal Pradesh</option><option value="Jammu and Kashmir">Jammu and Kashmir</option><option value="Jharkhand">Jharkhand</option><option value="Karnataka">Karnataka</option><option value="Madhya Pradesh">Madhya Pradesh</option><option value="Maharashtra">Maharashtra</option><option value="Meghalaya">Meghalaya</option><option value="Odisha">Odisha</option><option value="Punjab">Punjab</option><option value="Rajasthan">Rajasthan</option><option value="Tamil Nadu">Tamil Nadu</option><option value="Telangana">Telangana</option><option value="Tripura">Tripura</option><option value="Uttar Pradesh">Uttar Pradesh</option><option value="Uttarakhand">Uttarakhand</option><option value="West Bengal">West Bengal</option>
      </select>
    </div>

    <div class="field">
      <label>City <span class="required">*</span></label>
      <select id="candidate_city" required disabled>
        <option value="">Select State First</option>
      </select>
    </div>

    <div class="field">
      <label>Applied Job Role <span class="required">*</span></label>
      <select id="job_role" required>
        <option value="">Select</option>
        <option>Sales</option>
        <option>Tele</option>
        <option>Marketing</option>
      </select>
    </div>

    <div class="field" id="referralWrap">
      <label>Referral / Referrer Name</label>
      <input id="referred_by" placeholder="Enter referral name if applicable" maxlength="80" pattern="[A-Za-z\u0900-\u097F][A-Za-z\u0900-\u097F .'\-]{1,79}" title="Name should use letters only; spaces, dot, apostrophe and hyphen are allowed.">
      <p class="small">Leave blank if not referred.</p>
    </div>
  </div>

  <input type="hidden" id="source" value="Referral DISC Link">
  <button id="submitBtn" type="submit">Start DISC Test</button>
</form>
</main>

const params = new URLSearchParams(window.location.search);

function byId(id){return document.getElementById(id);}
function clean(v){return String(v || "").trim();}
function digits(v){return String(v || "").replace(/\D/g,"");}
function isValidEmail(value){
  value = String(value || "").trim().toLowerCase();
  return /^[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}$/.test(value);
}
function isValidName(value){
  value = String(value || "").trim().replace(/\s+/g, " ");
  return /^[A-Za-zऀ-ॿ][A-Za-zऀ-ॿ .'\-]{1,79}$/.test(value);
}
function isValidIndianMobile(value){
  return /^[6-9][0-9]{9}$/.test(digits(value));
}
function showErr(m){byId("err").textContent=m;byId("err").style.display="block";byId("ok").style.display="none";window.scrollTo({top:0,behavior:"smooth"});}
function showOk(html){byId("ok").innerHTML=html;byId("ok").style.display="block";byId("err").style.display="none";window.scrollTo({top:0,behavior:"smooth"});}
const LOCAL_N8N_BACKEND_BASE_URL = "http://localhost:5678/webhook";
//const CLOUD_N8N_BACKEND_BASE_URL = "https://bajajcapital.app.n8n.cloud/webhook";
const GCP_N8N_BACKEND_BASE_URL = "https://n8n-344958789989.asia-south1.run.app/webhook";

const N8N_BACKEND_BASE_URL =
  window.location.hostname === "localhost" ||
  window.location.hostname === "127.0.0.1"
    ? LOCAL_N8N_BACKEND_BASE_URL
    : GCP_N8N_BACKEND_BASE_URL;

const REFERRAL_DISC_REGISTER_URL =
  N8N_BACKEND_BASE_URL + "/disc-invite-create-and-send-backend";


function showLoading(title, text) {
  var overlay = byId("loadingOverlay");
  if (!overlay) return;
  byId("loadingTitle").textContent = title || "Submitting your DISC assessment";
  byId("loadingText").textContent = text || "Please wait. Do not refresh or close this page.";
  overlay.classList.add("active");
}
function hideLoading() {
  var overlay = byId("loadingOverlay");
  if (overlay) overlay.classList.remove("active");
}
function fetchWithTimeout(url, options, timeoutMs) {
  var controller = new AbortController();
  var timer = setTimeout(function(){ controller.abort(); }, timeoutMs || 45000);
  options = options || {};
  options.signal = controller.signal;
  return fetch(url, options).finally(function(){ clearTimeout(timer); });
}

function populateCities(){
  const state = byId("candidate_state").value;
  const city = byId("candidate_city");
  city.innerHTML = '<option value="">' + bcLocationLabel(state ? "Select City" : "Select State First") + '</option>';
  (CONFIG.locationMap[state] || []).slice().sort((a,b)=>a.localeCompare(b)).forEach(c => {
    const o = document.createElement("option");
    o.value = c;
    o.textContent = c;
    city.appendChild(o);
  });
  city.disabled = !state;
}

byId("candidate_state").addEventListener("change", populateCities);

// HR can share a clean link. Optional query params are supported but not required:
// ?source=Referral DISC Link&referred_by=EmployeeName&job_role=Sales
if(params.get("source")) byId("source").value = params.get("source");
if(params.get("referred_by")) byId("referred_by").value = params.get("referred_by");
if(params.get("job_role")) byId("job_role").value = params.get("job_role");

byId("f").addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    action: "direct_disc_register",
    candidate_name: clean(byId("candidate_name").value),
    candidate_email: String(byId("candidate_email").value || "").trim().toLowerCase(),
    candidate_mobile: digits(byId("candidate_mobile").value),
    candidate_state: clean(byId("candidate_state").value),
    candidate_city: clean(byId("candidate_city").value),
    job_role: clean(byId("job_role").value),
    source: clean(byId("source").value) || "Direct DISC Link",
    referred_by: clean(byId("referred_by").value),
    preferred_language: (window.BC_I18N && window.BC_I18N.payload ? window.BC_I18N.payload() : (localStorage.getItem("preferred_language") || "en"))
  };

  if(!isValidName(data.candidate_name)) return showErr("Enter candidate name.");
  if(!isValidEmail(data.candidate_email)) return showErr("Enter valid email.");
  if(!isValidIndianMobile(data.candidate_mobile)) return showErr("Enter exactly 10 digit mobile number.");
  if(!data.candidate_state || !data.candidate_city) return showErr("Select state and city.");
  if(!data.job_role) return showErr("Select applied job role.");

  const btn = byId("submitBtn");
  btn.disabled = true;
  btn.textContent = "Preparing DISC Test...";
  showLoading("Preparing DISC test", "Creating secure link and saving candidate details.");

  try {
    const res = await fetchWithTimeout(REFERRAL_DISC_REGISTER_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=UTF-8"},
      body:JSON.stringify(data)
    }, 45000);

    const rawText = await res.text();
    let result = {};

    try {
      result = rawText ? JSON.parse(rawText) : {};
    } catch(parseErr) {
      result = { raw: rawText };
    }

    if (Array.isArray(result)) {
      result = result[0] && (result[0].json || result[0]) ? (result[0].json || result[0]) : {};
    }

    const nested = result.data || result.result || result.json || {};
    const link =
      clean(result.disc_link) ||
      clean(result["DISC Link"]) ||
      clean(result.discLink) ||
      clean(result.link) ||
      clean(result.url) ||
      clean(nested.disc_link) ||
      clean(nested["DISC Link"]) ||
      clean(nested.discLink) ||
      clean(nested.link) ||
      clean(nested.url);

    const isBackendSuccess =
      result.ok === true ||
      result.success === true ||
      nested.ok === true ||
      nested.success === true ||
      (!!link && res.ok);

    if(!res.ok || !isBackendSuccess) {
      hideLoading();
      btn.disabled = false;
      btn.textContent = "Start DISC Test";
      return showErr(
        result.message ||
        result.error ||
        nested.message ||
        nested.error ||
        result.raw ||
        "Unable to start DISC test."
      );
    }

    if(!link) {
      hideLoading();
      btn.disabled = false;
      btn.textContent = "Start DISC Test";
      console.log("Referral DISC backend response without link:", result);
      return showErr("DISC link was not generated by backend. Check n8n Respond to Webhook output for disc_link / DISC Link.");
    }

    showOk('Your DISC assessment link has also been sent to your email.<br>Redirecting to DISC test...');
    setTimeout(function(){ window.location.href = (window.BC_I18N && window.BC_I18N.appendLang ? window.BC_I18N.appendLang(link) : link); }, 800);
  } catch(err) {
    hideLoading();
    btn.disabled = false;
    btn.textContent = "Start DISC Test";
    showErr(err && err.name === "AbortError" ? "Referral DISC backend timed out. Please try again." : "Could not reach referral DISC backend. Check n8n workflow is active and the webhook path is disc-invite-create-and-send-backend.");
  }
});
</script>

  function translateRaw(raw){
    var normalized = clean(raw);
    if (!normalized) return raw;
    var prefixMatch = normalized.match(/^(\d+\.\s+)(.*)$/);
    var translated = HI[normalized];
    if (!translated && prefixMatch && HI[prefixMatch[2]]) translated = prefixMatch[1] + HI[prefixMatch[2]];
    if (!translated) translated = normalized;
    for (var i = 0; i < REPLACEMENTS.length; i++) translated = translated.replace(REPLACEMENTS[i][0], REPLACEMENTS[i][1]);
    return String(raw).replace(normalized, translated);
  }
  function skipNode(node){
    var el = node.nodeType === 1 ? node : node.parentElement;
    if (!el) return true;
    if (el.closest && el.closest("script,style,noscript,.notranslate,[translate='no'],[data-no-translate='true']")) return true;
    return false;
  }
  function applyTextNode(node, lang){
    if (!node || !node.nodeValue || !clean(node.nodeValue)) return;
    if (skipNode(node)) return;
    if (!originalText.has(node)) originalText.set(node, node.nodeValue);
    var original = originalText.get(node);
    node.nodeValue = lang === "hi" ? translateRaw(original) : original;
  }
  function applyElementAttrs(el, lang){
    if (!el || skipNode(el)) return;
    var stored = originalAttrs.get(el);
    if (!stored) { stored = {}; originalAttrs.set(el, stored); }
    attrNames.forEach(function(attr){
      if (!el.hasAttribute || !el.hasAttribute(attr)) return;
      if (stored[attr] == null) stored[attr] = el.getAttribute(attr);
      el.setAttribute(attr, lang === "hi" ? translateRaw(stored[attr]) : stored[attr]);
    });
  }
  function applySelectOptions(lang){
    Array.prototype.slice.call(document.querySelectorAll("select option")).forEach(function(opt){
      if (opt.closest && opt.closest("#languageSelect")) return;
      if (!originalText.has(opt)) originalText.set(opt, opt.textContent);
      var original = originalText.get(opt);
      opt.textContent = lang === "hi" ? translateRaw(original) : original;
    });
  }
  function applyLanguage(){
    var lang = getLang();
    document.documentElement.setAttribute("lang", lang);
    var select = document.getElementById("languageSelect");
    if (select) select.value = lang;
    var walker = document.createTreeWalker(document.body || document.documentElement, NodeFilter.SHOW_TEXT, {
      acceptNode: function(node){ return skipNode(node) ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT; }
    });
    var nodes = [], n;
    while ((n = walker.nextNode())) nodes.push(n);
    nodes.forEach(function(node){ applyTextNode(node, lang); });
    Array.prototype.slice.call(document.querySelectorAll("[placeholder],[title],[aria-label]")).forEach(function(el){ applyElementAttrs(el, lang); });
    applySelectOptions(lang);
  }
  function attachValidation(){
    var nameIds = ["candidate_name", "referred_by"];
    nameIds.forEach(function(id){
      var el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("input", function(){ this.value = this.value.replace(/\s{2,}/g, " "); });
      el.addEventListener("blur", function(){ this.value = this.value.trim().replace(/\s{2,}/g, " "); });
    });
    ["mobile", "candidate_mobile"].forEach(function(id){
      var el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("input", function(){ this.value = String(this.value || "").replace(/\D/g, "").slice(0, 10); });
    });
  }
  document.addEventListener("change", function(ev){
    if (ev.target && ev.target.id === "languageSelect") {
      saveLang(ev.target.value);
      applyLanguage();
    }
  });
  window.BC_V35_APPLY_LANGUAGE = applyLanguage;
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function(){ attachValidation(); applyLanguage(); setTimeout(applyLanguage, 250); });
  } else {
    attachValidation(); applyLanguage(); setTimeout(applyLanguage, 250);
  }
  var timer = null;
  try {
    new MutationObserver(function(){ clearTimeout(timer); timer = setTimeout(applyLanguage, 60); }).observe(document.documentElement, { childList:true, subtree:true });
  } catch(e) {}
})();
</script>
<script id="bc-location-language-fix">
(function(){
  "use strict";

  function normalizeLang(value){
    value = String(value || "").trim().toLowerCase();
    if (value === "hi" || value === "hindi" || value === "हिंदी" || value === "हिन्दी") return "hi";
    return "en";
  }

  function currentLang(){
    var select = document.getElementById("languageSelect");
    if (select && select.value) return normalizeLang(select.value);
    try {
      var params = new URLSearchParams(window.location.search || "");
      var urlLang = params.get("lang") || params.get("language") || params.get("preferred_language") || "";
      if (urlLang) return normalizeLang(urlLang);
    } catch(e) {}
    try {
      return normalizeLang(localStorage.getItem("preferred_language") || localStorage.getItem("bc_preferred_language") || "en");
    } catch(e) {}
    return "en";
  }

  function englishForLocationOption(option){
    if (!option) return "";
    var stored = option.getAttribute("data-bc-en");
    if (stored) return stored;
    var value = String(option.value || "").trim();
    if (value) return value;

    var text = String(option.textContent || "").trim();
    var select = option.parentElement;
    var selectId = select && select.id ? select.id : "";

    if (/पहले|first/i.test(text)) return "Select State First";
    if (selectId === "state" || selectId === "candidate_state") return "Select State";
    if (selectId === "city" || selectId === "candidate_city") return text && !/शहर|city/i.test(text) ? text : "Select City";
    if (/राज्य|state/i.test(text)) return "Select State";
    if (/शहर|city/i.test(text)) return "Select City";
    return text;
  }

  function locationLabel(value){
    var english = String(value || "").trim();
    if (!english) return "";
    if (currentLang() === "hi") {
      try {
        if (window.BC_LOCATION_HI && window.BC_LOCATION_HI[english]) return window.BC_LOCATION_HI[english];
      } catch(e) {}
      try {
        if (typeof BC_LOCATION_HI !== "undefined" && BC_LOCATION_HI[english]) return BC_LOCATION_HI[english];
      } catch(e) {}
    }
    return english;
  }

  window.bcLocationLabel = locationLabel;

  function fixLocationSelect(select){
    if (!select) return;
    Array.prototype.slice.call(select.options || []).forEach(function(option){
      var english = englishForLocationOption(option);
      if (!option.getAttribute("data-bc-en")) option.setAttribute("data-bc-en", english);
      var nextText = locationLabel(english);
      if (option.textContent !== nextText) option.textContent = nextText;
    });
  }

  function fixAllLocationLabels(){
    ["state", "city", "candidate_state", "candidate_city"].forEach(function(id){
      fixLocationSelect(document.getElementById(id));
    });
  }

  function refreshAfterLanguageChange(){
    fixAllLocationLabels();
    if (typeof window.buildDisc === "function" && document.getElementById("discContainer")) {
      try { window.buildDisc(); } catch(e) {}
    }
    setTimeout(fixAllLocationLabels, 0);
    setTimeout(fixAllLocationLabels, 80);
  }

  document.addEventListener("change", function(event){
    if (event.target && event.target.id === "languageSelect") refreshAfterLanguageChange();
    if (event.target && (event.target.id === "state" || event.target.id === "candidate_state")) setTimeout(fixAllLocationLabels, 0);
  });

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", refreshAfterLanguageChange);
  } else {
    refreshAfterLanguageChange();
  }

  try {
    var observerTimer = null;
    new MutationObserver(function(){
      clearTimeout(observerTimer);
      observerTimer = setTimeout(fixAllLocationLabels, 25);
    }).observe(document.body || document.documentElement, { childList: true, subtree: true });
  } catch(e) {}
})();
</script>

<script id="bc-final-refer-city-language-fix">
(function(){
  "use strict";
  function clean(v){ return String(v == null ? "" : v).replace(/\s+/g," ").trim(); }
  function normalizeLang(v){ v = clean(v).toLowerCase(); return (v === "hi" || v === "hindi" || v === "हिंदी" || v === "हिन्दी") ? "hi" : "en"; }
  function getLang(){
    try { var sel = document.getElementById("languageSelect"); if (sel && sel.value) return normalizeLang(sel.value); } catch(e) {}
    try { var p = new URLSearchParams(location.search || ""); var u = p.get("lang") || p.get("language") || p.get("preferred_language") || p.get("preferredLanguage"); if (u) return normalizeLang(u); } catch(e) {}
    try { return normalizeLang(localStorage.getItem("preferred_language") || localStorage.getItem("bc_preferred_language") || "en"); } catch(e) {}
    return "en";
  }
  function setSavedLang(lang){
    lang = normalizeLang(lang);
    try { localStorage.setItem("preferred_language", lang); localStorage.setItem("bc_preferred_language", lang); } catch(e) {}
    return lang;
  }
  var reverseLocation = {};
  function rebuildReverse(){
    reverseLocation = {};
    try {
      Object.keys(window.BC_LOCATION_HI || {}).forEach(function(en){ reverseLocation[clean(window.BC_LOCATION_HI[en])] = en; });
    } catch(e) {}
  }
  function englishLocation(v){
    v = clean(v);
    if (!v) return "";
    rebuildReverse();
    if (reverseLocation[v]) return reverseLocation[v];
    try {
      if (window.CONFIG && window.CONFIG.locationMap) {
        if (window.CONFIG.locationMap[v]) return v;
        var states = Object.keys(window.CONFIG.locationMap);
        for (var i=0;i<states.length;i++) {
          if (states[i].toLowerCase() === v.toLowerCase()) return states[i];
          var arr = window.CONFIG.locationMap[states[i]] || [];
          for (var j=0;j<arr.length;j++) if (arr[j].toLowerCase() === v.toLowerCase()) return arr[j];
        }
      }
    } catch(e) {}
    return v;
  }
  function locationLabel(en){
    en = clean(en);
    if (!en) return "";
    if (getLang() === "hi") {
      try { if (window.BC_LOCATION_HI && window.BC_LOCATION_HI[en]) return window.BC_LOCATION_HI[en]; } catch(e) {}
    }
    return en;
  }
  function stableCandidateId(){
    var current = "";
    try { current = clean(window.__bcCandidateId || localStorage.getItem("bc_candidate_id_v1") || ""); } catch(e) { current = clean(window.__bcCandidateId || ""); }
    if (!current) {
      try {
        var saved = JSON.parse(localStorage.getItem("bajaj_preselection_resume_v3") || "{}");
        current = clean(saved.candidate_id || saved.candidateId || saved["Candidate ID"] || "");
      } catch(e) {}
    }
    if (!current) {
      var mobile = "";
      try { mobile = String((window.digitsOnly ? window.digitsOnly((window.val ? window.val("mobile") : "")) : "") || "").slice(-4); } catch(e) {}
      current = "CAND-" + Date.now() + "-" + ((mobile || Math.random().toString(36).slice(2,6)).toUpperCase());
    }
    window.__bcCandidateId = current;
    try { localStorage.setItem("bc_candidate_id_v1", current); } catch(e) {}
    return current;
  }

  var originalVal = window.val;
  if (typeof originalVal === "function" && !originalVal.__bcFinalFixed) {
    window.val = function(id){
      var v = originalVal.call(this, id);
      if (id === "state" || id === "city" || id === "candidate_state" || id === "candidate_city") return englishLocation(v);
      return v;
    };
    window.val.__bcFinalFixed = true;
  }

  var originalSetVal = window.setVal;
  if (typeof originalSetVal === "function" && !originalSetVal.__bcFinalFixed) {
    window.setVal = function(id, value){
      if (id === "state" || id === "city" || id === "candidate_state" || id === "candidate_city") value = englishLocation(value);
      return originalSetVal.call(this, id, value);
    };
    window.setVal.__bcFinalFixed = true;
  }

  window.generateCandidateId = stableCandidateId;

  var originalCollect = window.collectData;
  if (typeof originalCollect === "function" && !originalCollect.__bcFinalFixed) {
    window.collectData = function(){
      var d = originalCollect.apply(this, arguments) || {};
      var id = stableCandidateId();
      var lang = setSavedLang(getLang());
      d.candidate_id = id;
      d.candidateId = id;
      d["Candidate ID"] = id;
      d.state = englishLocation(d.state || (window.val ? window.val("state") : ""));
      d.city = englishLocation(d.city || (window.val ? window.val("city") : ""));
      d.candidate_state = d.state;
      d.candidate_city = d.city;
      d.preferred_language = lang;
      d.preferredLanguage = lang;
      d.language = lang;
      d.lang = lang;
      d["Preferred Language"] = lang;
      return d;
    };
    window.collectData.__bcFinalFixed = true;
  }

  function translateStaticLocationSelect(select){
    if (!select) return;
    Array.prototype.slice.call(select.options || []).forEach(function(opt){
      var en = englishLocation(opt.getAttribute("data-bc-en") || opt.value || opt.textContent);
      if (!opt.value && (en === "Select State" || en === "Select City" || en === "Select State First")) en = opt.textContent;
      opt.setAttribute("data-bc-en", en);
      if (opt.value) opt.value = en;
      if (!opt.value && /state/i.test(select.id || "")) opt.textContent = locationLabel("Select State");
      else if (!opt.value && /city/i.test(select.id || "")) opt.textContent = locationLabel(select.disabled ? "Select State First" : "Select City");
      else opt.textContent = locationLabel(en);
    });
  }

  var originalPopulateCities = window.populateCities;
  window.populateCities = function(){
    var stateEl = document.getElementById("state");
    var cityEl = document.getElementById("city");
    if (!stateEl || !cityEl || !window.CONFIG || !window.CONFIG.locationMap) {
      if (typeof originalPopulateCities === "function") return originalPopulateCities.apply(this, arguments);
      return;
    }
    var state = englishLocation(stateEl.value);
    if (stateEl.value !== state) stateEl.value = state;
    var selectedCity = englishLocation(cityEl.value);
    cityEl.innerHTML = "";
    var ph = document.createElement("option");
    ph.value = "";
    ph.setAttribute("data-bc-en", state ? "Select City" : "Select State First");
    ph.textContent = locationLabel(state ? "Select City" : "Select State First");
    cityEl.appendChild(ph);
    (window.CONFIG.locationMap[state] || []).slice().sort(function(a,b){ return a.localeCompare(b); }).forEach(function(c){
      var opt = document.createElement("option");
      opt.value = c;
      opt.setAttribute("data-bc-en", c);
      opt.textContent = locationLabel(c);
      cityEl.appendChild(opt);
    });
    cityEl.disabled = !state;
    if (selectedCity && (window.CONFIG.locationMap[state] || []).indexOf(selectedCity) >= 0) cityEl.value = selectedCity;
    translateStaticLocationSelect(stateEl);
  };
  window.populateCities.__bcFinalFixed = true;

  function refreshLocations(){
    var stateEl = document.getElementById("state");
    var cityEl = document.getElementById("city");
    if (stateEl) {
      var s = englishLocation(stateEl.value);
      translateStaticLocationSelect(stateEl);
      if (s) stateEl.value = s;
    }
    if (cityEl) {
      var c = englishLocation(cityEl.value);
      if (typeof window.populateCities === "function") window.populateCities();
      if (c) cityEl.value = c;
    }
  }

  function ensureDiscLinksHaveLang(){
    var lang = setSavedLang(getLang());
    Array.prototype.slice.call(document.querySelectorAll('a[href*="disc.html"], a[href*="disc_unified_no_validate.html"]')).forEach(function(a){
      try {
        var u = new URL(a.getAttribute("href"), window.location.href);
        u.searchParams.set("lang", lang);
        u.searchParams.set("preferred_language", lang);
        a.setAttribute("href", u.toString());
      } catch(e) {}
    });
  }

  document.addEventListener("change", function(ev){
    if (!ev.target) return;
    if (ev.target.id === "languageSelect") { setSavedLang(ev.target.value); setTimeout(refreshLocations, 0); setTimeout(ensureDiscLinksHaveLang, 0); }
    if (ev.target.id === "state") setTimeout(refreshLocations, 0);
    if (ev.target.id === "city") ev.target.value = englishLocation(ev.target.value);
  });

  try { var selectedLang = getLang(); var languageSelect = document.getElementById("languageSelect"); if (languageSelect) languageSelect.value = selectedLang; setSavedLang(selectedLang); } catch(e) {}
  setTimeout(refreshLocations, 0);
  setTimeout(ensureDiscLinksHaveLang, 0);
  setTimeout(refreshLocations, 150);
})();
</script>
